<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITE Chat UI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --navy-blue-top: #141e30;
            --mid-blue: #243b55;
            --light-blue-main: #6dd5fa;
            --accent-color: #00c6ff;
            --user-bubble-bg: #00c6ff;
            --bot-bubble-bg: #ffffff;
            --body-bg: #e9ecef;
            --font-color-dark: #343a40;
            --font-color-light: #ffffff;
            --shadow: 0 8px 30px rgba(0,0,0,0.15);
            --border-radius-large: 25px;
            --border-radius-small: 15px;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background-color: var(--body-bg);
        }

        .chat-container {
            width: 420px;
            height: 700px;
            border-radius: var(--border-radius-large);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(180deg, var(--navy-blue-top) 0%, var(--mid-blue) 35%, var(--light-blue-main) 100%);
            position: relative;
        }
        
        .chat-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('kitelogo.png');
            background-size: 60%;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.40;
            z-index: 0;
        }

        .chat-header {
            color: var(--font-color-light);
            padding: 18px 25px;
            display: flex;
            align-items: center;
            z-index: 10;
            background: rgba(3, 94, 160, 0.719);
            backdrop-filter: blur(5px);
            position: relative;
        }

        .chat-header .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            background-color: #ffffff;
            box-shadow: 0 0 12px rgba(0, 198, 255, 0.7);
            border: 2px solid #ffffffb3;
            position: relative;
            z-index: 1;
        }

        .chat-header .avatar img {
            width: 90%;
            height: 90%;
            object-fit: contain; 
            object-position: center;
        }

        .chat-header .bot-info h3 { 
            margin: 0; 
            font-size: 1.25rem; 
            font-weight: 600; 
            position: relative;
            z-index: 1;
        }

        .chat-header .bot-info p { 
            margin: 0; 
            font-size: 0.85rem; 
            opacity: 0.9; 
            position: relative;
            z-index: 1;
        }

        .chat-body {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: transparent;
            position: relative;
            z-index: 1;
        }

        .message {
            display: flex;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message .bubble {
            padding: 12px 18px;
            border-radius: var(--border-radius-small);
            line-height: 1.5;
            box-shadow: 0 2px 8px rgba(4, 156, 232, 0.789);
            position: relative;
        }

        .message.bot { align-self: flex-start; }
        .message.bot .bubble {
            background: var(--bot-bubble-bg);
            color: var(--font-color-dark);
            border-bottom-left-radius: 4px;
        }

        .message.user { align-self: flex-end; }
        .message.user .bubble {
            background: var(--accent-color);
            color: var(--font-color-dark);
            border-bottom-right-radius: 4px;
        }

        .chat-footer {
            padding: 15px 20px;
            z-index: 10;
            background: rgba(5, 65, 117, 0.53);
            backdrop-filter: blur(5px);
            position: relative;
        }

        .quick-replies { display: none; }

        .input-group { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            position: relative;
            z-index: 1;
        }

        .input-group input { 
            flex-grow: 1; 
            border: 1px solid rgb(255, 255, 255); 
            border-radius: 25px; 
            padding: 12px 20px; 
            font-size: 1rem; 
            outline: none; 
            transition: all 0.3s ease; 
            background: #ffffff; 
            color: var(--font-color-dark);
            position: relative;
            z-index: 1;
        }

        .input-group input::placeholder {
            color: #000000;
        }

        .input-group input:focus { 
            border-color: var(--accent-color);
            background: #ffffff;
        }

        .input-group button { 
            background: var(--accent-color); 
            border: none; 
            color: var(--font-color-dark);
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            font-size: 1.3rem; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(121, 222, 255, 0.27); 
            transition: background 0.3s ease, transform 0.2s ease; 
            position: relative;
            z-index: 1;
        }

        .input-group button:hover { 
            background: #f4f6f7;
        }

        /* Processing indicator styles */
        .message.processing { display: none; }
        .message.processing.visible { 
            display: flex; 
            align-self: flex-start; 
        }

        .processing-indicator {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .processing-indicator span {
            width: 8px;
            height: 8px;
            background-color: var(--font-color-dark);
            border-radius: 50%;
            animation: dotPulse 1.4s infinite ease-in-out;
        }

        .processing-indicator span:nth-child(1) { animation-delay: 0s; }
        .processing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .processing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 60%, 100% { 
                opacity: 0.3;
                transform: scale(0.8);
            }
            30% { 
                opacity: 1;
                transform: scale(1.2);
            }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">
                <img src="logo.png" alt="KITE Logo">
            </div>
            <div class="bot-info">
                <h3>Campus Assistant</h3>
                <p>Online</p>
            </div>
        </div>

        <div class="chat-body" id="chat-body">
            <div class="message bot">
                <div class="bubble">
                    Hello! How can I help you today?
                </div>
            </div>

            <!-- Processing indicator -->
            <div class="message bot processing" id="processing-indicator">
                <div class="bubble">
                    <div class="processing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-footer">
            <div class="quick-replies" id="quick-replies"></div>
            <div class="input-group">
                <input type="text" id="user-input" placeholder="Ask me anything...">
                <button id="send-btn">&#10148;</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatBody = document.getElementById('chat-body');
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const processingIndicator = document.getElementById('processing-indicator');

            const addMessage = (text, sender) => {
                const messageElement = document.createElement('div');
                messageElement.classList.add('message', sender);
                const bubbleElement = document.createElement('div');
                bubbleElement.classList.add('bubble');
                bubbleElement.textContent = text;
                messageElement.appendChild(bubbleElement);
                chatBody.insertBefore(messageElement, processingIndicator);
                chatBody.scrollTop = chatBody.scrollHeight;
            };

            const showProcessing = () => {
                processingIndicator.classList.add('visible');
                chatBody.scrollTop = chatBody.scrollHeight;
            };

            const hideProcessing = () => {
                processingIndicator.classList.remove('visible');
            };

            const simulateBotResponse = (userMessage) => {
                showProcessing();
                setTimeout(() => {
                    hideProcessing();
                    let botReply = `Thank you for your message: "${userMessage}". I am a demo bot and cannot process this request.`;
                    addMessage(botReply, 'bot');
                }, 1500 + Math.random() * 500);
            };

            const handleSendMessage = () => {
                const text = userInput.value.trim();
                if (text) {
                    addMessage(text, 'user');
                    userInput.value = '';
                    simulateBotResponse(text);
                }
            };

            sendBtn.addEventListener('click', handleSendMessage);
            userInput.addEventListener('keypress', (event) => {
                if (event.key === 'Enter') { handleSendMessage(); }
            });
        });
    </script>
</body>
</html>
